<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2028</title>
  <style>
    :root {
      color-scheme: light;
      --bg1: #fff7ed;
      --bg2: #fde68a;
      --bg3: #f9a8d4;
      --panel: rgba(255,255,255,.30);
      --cell: rgba(255,255,255,.28);
      --text: #5b365f;
      --shadow: 0 18px 40px rgba(142, 63, 120, .18);
      --gap: 12px;
      --move-ms: 140ms;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.7), transparent 18%),
        radial-gradient(circle at 80% 15%, rgba(255,255,255,.45), transparent 20%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 48%, var(--bg3));
      color: var(--text);
      font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
      padding: 16px;
    }
    .app { width: min(92vw, 560px); }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    h1 { margin: 0; font-size: clamp(2.4rem, 8vw, 4.4rem); line-height: .95; }
    .hint { font-size: .98rem; margin-top: 8px; }
    .side { display: flex; flex-direction: column; gap: 10px; align-items: end; }
    .scores { display: flex; gap: 10px; }
    .scorebox {
      background: rgba(255,255,255,.4);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.4);
      border-radius: 16px;
      padding: 10px 16px;
      min-width: 92px;
      text-align: center;
      font-weight: 800;
      box-shadow: var(--shadow);
    }
    .scorebox small { display: block; font-size: .72rem; opacity: .8; }
    button {
      border: 0;
      background: linear-gradient(135deg, #fb7185, #f59e0b);
      color: white;
      border-radius: 999px;
      padding: 11px 16px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(244, 114, 182, .25);
    }
    .board-wrap {
      position: relative;
      background: var(--panel);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,.44);
      border-radius: 24px;
      padding: 12px;
      touch-action: none;
      user-select: none;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--gap);
    }
    .cell {
      aspect-ratio: 1;
      border-radius: 18px;
      background: var(--cell);
      box-shadow: inset 0 2px 8px rgba(255,255,255,.18), inset 0 -3px 10px rgba(91,54,95,.08);
    }
    .tiles {
      position: absolute;
      inset: 12px;
      pointer-events: none;
    }
    .tile {
      position: absolute;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: clamp(1.4rem, 6vw, 2.3rem);
      color: #5c3d2e;
      box-shadow: 0 10px 18px rgba(91,54,95,.16), inset 0 2px 10px rgba(255,255,255,.28);
      overflow: hidden;
      transition: transform var(--move-ms) ease, left var(--move-ms) ease, top var(--move-ms) ease;
      will-change: left, top, transform;
    }
    .tile::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.35), transparent 40%);
    }
    .spawn { animation: pop .22s ease-out; }
    .merge { animation: bounce .26s ease-out; }
    .board-wrap.bump { animation: jiggle .18s ease-out; }
    @keyframes pop { 0% { transform: scale(.25) rotate(-8deg); opacity: .4; } 70% { transform: scale(1.08) rotate(2deg); opacity: 1; } 100% { transform: scale(1) rotate(0); } }
    @keyframes bounce { 0% { transform: scale(.92); } 45% { transform: scale(1.16); } 100% { transform: scale(1); } }
    @keyframes jiggle { 0%,100% { transform: translateX(0); } 30% { transform: translateX(-4px); } 60% { transform: translateX(4px); } }
    .v2{background:linear-gradient(135deg,#fff7ed,#fde7d7)}
    .v4{background:linear-gradient(135deg,#fef3c7,#fde68a)}
    .v8{background:linear-gradient(135deg,#fdba74,#fb7185);color:#fffaf5}
    .v16{background:linear-gradient(135deg,#fb7185,#f472b6);color:#fffaf5}
    .v32{background:linear-gradient(135deg,#f97316,#fb7185);color:#fffaf5}
    .v64{background:linear-gradient(135deg,#ef4444,#ec4899);color:#fffaf5}
    .v128{background:linear-gradient(135deg,#f59e0b,#facc15);color:#fffaf5;font-size:clamp(1.2rem,5vw,2rem)}
    .v256{background:linear-gradient(135deg,#84cc16,#facc15);color:#fffaf5;font-size:clamp(1.2rem,5vw,2rem)}
    .v512{background:linear-gradient(135deg,#22c55e,#06b6d4);color:#fffaf5;font-size:clamp(1.2rem,5vw,2rem)}
    .v1024{background:linear-gradient(135deg,#38bdf8,#6366f1);color:#fffaf5;font-size:clamp(1rem,4.5vw,1.8rem)}
    .v2028,.v2048,.v4096,.v8192{background:linear-gradient(135deg,#8b5cf6,#ec4899);color:#fffaf5;font-size:clamp(1rem,4.5vw,1.8rem)}
    .overlay {
      position: absolute;
      inset: 12px;
      background: rgba(255,248,240,.72);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      display: none;
      place-items: center;
      text-align: center;
      padding: 20px;
    }
    .overlay.show { display: grid; }
    .overlay h2 { margin: 0 0 8px; font-size: 2rem; }
    .overlay p { margin: 0 0 14px; }
    .muted { opacity: .8; font-size: .92rem; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <div>
        <h1>2028 ✨</h1>
        <div class="hint">Uní fichas iguales. Flechas, WASD o swipe.</div>
      </div>
      <div class="side">
        <div class="scores">
          <div class="scorebox"><small>PUNTAJE</small><span id="score">0</span></div>
          <div class="scorebox"><small>MEJOR</small><span id="best">0</span></div>
        </div>
        <button id="newGame">Nuevo juego</button>
      </div>
    </div>

    <div class="board-wrap" id="boardWrap">
      <div class="grid" id="bgGrid"></div>
      <div class="tiles" id="tiles"></div>
      <div class="overlay" id="overlay">
        <div>
          <h2 id="overlayTitle"></h2>
          <p id="overlayText"></p>
          <button id="retryBtn">Jugar otra vez</button>
          <div class="muted">Podés seguir después de ganar.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SIZE = 4;
    const TARGET = 2028;
    const MOVE_MS = 140;
    const bgGrid = document.getElementById('bgGrid');
    const tilesEl = document.getElementById('tiles');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlayText = document.getElementById('overlayText');
    const boardWrap = document.getElementById('boardWrap');
    const bestKey = 'nano2028-best';

    let board, score, best, won, mergedCells, tileMap, tileSeq, animating;
    let touchStart = null;
    let audioCtx = null;
    let cellMetrics = null;

    function initBg() {
      bgGrid.innerHTML = '';
      for (let i = 0; i < SIZE * SIZE; i++) {
        const c = document.createElement('div');
        c.className = 'cell';
        bgGrid.appendChild(c);
      }
      requestAnimationFrame(measureBoard);
    }

    function measureBoard() {
      const first = bgGrid.querySelector('.cell');
      if (!first) return;
      const cellRect = first.getBoundingClientRect();
      const tilesRect = tilesEl.getBoundingClientRect();
      cellMetrics = {
        size: cellRect.width,
        gap: parseFloat(getComputedStyle(bgGrid).gap) || 12,
        offsetX: cellRect.left - tilesRect.left,
        offsetY: cellRect.top - tilesRect.top,
      };
    }

    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function tone(freq, duration, type, volume, when = 0) {
      if (!audioCtx) return;
      const t0 = audioCtx.currentTime + when;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t0);
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.exponentialRampToValueAtTime(volume, t0 + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t0);
      osc.stop(t0 + duration + 0.02);
    }

    function playMoveSound() { tone(520, .08, 'sine', .02); }
    function playMergeSound(level = 1) {
      const base = 440 + Math.min(level, 10) * 30;
      tone(base, .10, 'triangle', .03, 0);
      tone(base * 1.25, .14, 'sine', .02, .03);
    }
    function playWinSound() { [660, 880, 1100, 1320].forEach((f, i) => tone(f, .16, 'triangle', .035, i * .06)); }
    function playLoseSound() { [440, 330, 262].forEach((f, i) => tone(f, .18, 'sine', .025, i * .08)); }

    function emptyBoard() {
      return Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
    }

    function createTile(value, r, c) {
      const el = document.createElement('div');
      const tile = { id: ++tileSeq, value, r, c, el };
      el.className = `tile v${value}`;
      el.textContent = value;
      el.dataset.id = tile.id;
      tilesEl.appendChild(el);
      positionTile(tile, false);
      return tile;
    }

    function positionTile(tile, animate = true) {
      if (!cellMetrics) measureBoard();
      const { size, gap, offsetX, offsetY } = cellMetrics;
      tile.el.style.width = `${size}px`;
      tile.el.style.height = `${size}px`;
      tile.el.style.left = `${offsetX + tile.c * (size + gap)}px`;
      tile.el.style.top = `${offsetY + tile.r * (size + gap)}px`;
      tile.el.style.transitionDuration = animate ? `${MOVE_MS}ms` : '0ms';
    }

    function syncBoardFromTiles() {
      board = emptyBoard();
      for (const tile of tileMap.values()) board[tile.r][tile.c] = tile.value;
    }

    function startGame() {
      score = 0;
      won = false;
      mergedCells = new Set();
      tileMap = new Map();
      tileSeq = 0;
      animating = false;
      hideOverlay();
      tilesEl.innerHTML = '';
      addRandomTile(true);
      addRandomTile(true);
      syncBoardFromTiles();
      updateScore();
    }

    function emptyCells() {
      const used = new Set(Array.from(tileMap.values(), t => `${t.r},${t.c}`));
      const cells = [];
      for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) if (!used.has(`${r},${c}`)) cells.push([r, c]);
      return cells;
    }

    function addRandomTile(spawnAnim = false) {
      const empty = emptyCells();
      if (!empty.length) return null;
      const [r, c] = empty[Math.floor(Math.random() * empty.length)];
      const value = Math.random() < 0.9 ? 2 : 4;
      const tile = createTile(value, r, c);
      tileMap.set(tile.id, tile);
      if (spawnAnim) tile.el.classList.add('spawn');
      return tile;
    }

    function updateScore() {
      scoreEl.textContent = score;
      bestEl.textContent = best;
    }

    function planMove(dir) {
      const lines = [];
      if (dir === 'left' || dir === 'right') {
        for (let r = 0; r < SIZE; r++) {
          const tiles = Array.from(tileMap.values()).filter(t => t.r === r).sort((a, b) => a.c - b.c);
          lines.push({ kind: 'row', index: r, tiles: dir === 'right' ? tiles.reverse() : tiles, reverse: dir === 'right' });
        }
      } else {
        for (let c = 0; c < SIZE; c++) {
          const tiles = Array.from(tileMap.values()).filter(t => t.c === c).sort((a, b) => a.r - b.r);
          lines.push({ kind: 'col', index: c, tiles: dir === 'down' ? tiles.reverse() : tiles, reverse: dir === 'down' });
        }
      }

      const actions = [];
      const merged = new Set();
      let gained = 0;
      let moved = false;
      const occupied = emptyBoard();

      for (const line of lines) {
        const arr = line.tiles;
        let target = 0;
        for (let i = 0; i < arr.length; i++) {
          const current = arr[i];
          const next = arr[i + 1];
          const canMerge = next && next.value === current.value;
          const pos = line.reverse ? SIZE - 1 - target : target;
          const dest = line.kind === 'row' ? [line.index, pos] : [pos, line.index];
          if (canMerge) {
            const mergedValue = current.value * 2;
            actions.push({ type: 'move-merge', tile: current, to: dest, value: current.value });
            actions.push({ type: 'move-merge-remove', tile: next, to: dest, value: next.value, mergedValue });
            merged.add(dest.join(','));
            occupied[dest[0]][dest[1]] = mergedValue;
            gained += mergedValue;
            if (mergedValue === TARGET) won = true;
            moved = moved || current.r !== dest[0] || current.c !== dest[1] || next.r !== dest[0] || next.c !== dest[1];
            i++;
          } else {
            actions.push({ type: 'move', tile: current, to: dest, value: current.value });
            occupied[dest[0]][dest[1]] = current.value;
            moved = moved || current.r !== dest[0] || current.c !== dest[1];
          }
          target++;
        }
      }

      return { actions, merged, gained, moved, nextBoard: occupied };
    }

    function applyPlan(plan) {
      animating = true;
      mergedCells = plan.merged;

      for (const action of plan.actions) {
        action.tile.r = action.to[0];
        action.tile.c = action.to[1];
        positionTile(action.tile, true);
      }

      setTimeout(() => {
        const nextMap = new Map();
        const mergeBuckets = new Map();

        for (const action of plan.actions) {
          const key = `${action.to[0]},${action.to[1]}`;
          if (action.type === 'move') {
            const tile = action.tile;
            tile.value = action.value;
            tile.el.className = `tile v${tile.value}`;
            tile.el.textContent = tile.value;
            nextMap.set(tile.id, tile);
          } else {
            if (!mergeBuckets.has(key)) mergeBuckets.set(key, []);
            mergeBuckets.get(key).push(action);
          }
        }

        for (const [, bucket] of mergeBuckets) {
          const keeper = bucket[0].tile;
          const mergedValue = bucket[1].mergedValue;
          keeper.value = mergedValue;
          keeper.el.className = `tile v${mergedValue} merge`;
          keeper.el.textContent = mergedValue;
          nextMap.set(keeper.id, keeper);
          const removeTile = bucket[1].tile;
          removeTile.el.remove();
        }

        tileMap = nextMap;
        score += plan.gained;
        if (score > best) {
          best = score;
          localStorage.setItem(bestKey, String(best));
        }
        updateScore();
        const spawned = addRandomTile(true);
        syncBoardFromTiles();
        animating = false;
        playMoveSound();
        if (plan.gained) playMergeSound(Math.log2(plan.gained));
        if (won) {
          showOverlay('🎉 ¡Ganaste!', 'Llegaste a 2028. Podés seguir jugando.');
          playWinSound();
        } else if (!canMove()) {
          showOverlay('🌙 Fin del juego', 'No quedan movimientos.');
          playLoseSound();
        }
      }, MOVE_MS + 20);
    }

    function move(dir) {
      if (animating) return;
      ensureAudio();
      const plan = planMove(dir);
      if (!plan.moved) {
        boardWrap.classList.remove('bump');
        void boardWrap.offsetWidth;
        boardWrap.classList.add('bump');
        setTimeout(() => boardWrap.classList.remove('bump'), 180);
        return;
      }
      applyPlan(plan);
    }

    function canMove() {
      if (tileMap.size < SIZE * SIZE) return true;
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (c < SIZE - 1 && board[r][c] === board[r][c + 1]) return true;
          if (r < SIZE - 1 && board[r][c] === board[r + 1][c]) return true;
        }
      }
      return false;
    }

    function showOverlay(title, text) {
      overlayTitle.textContent = title;
      overlayText.textContent = text;
      overlay.classList.add('show');
    }

    function hideOverlay() {
      overlay.classList.remove('show');
    }

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      const dirs = {
        arrowleft: 'left', a: 'left',
        arrowright: 'right', d: 'right',
        arrowup: 'up', w: 'up',
        arrowdown: 'down', s: 'down'
      };
      if (!dirs[key]) return;
      e.preventDefault();
      hideOverlay();
      move(dirs[key]);
    });

    boardWrap.addEventListener('touchstart', (e) => {
      ensureAudio();
      const t = e.changedTouches[0];
      touchStart = { x: t.clientX, y: t.clientY };
    }, { passive: true });

    boardWrap.addEventListener('touchend', (e) => {
      if (!touchStart) return;
      const t = e.changedTouches[0];
      const dx = t.clientX - touchStart.x;
      const dy = t.clientY - touchStart.y;
      touchStart = null;
      if (Math.max(Math.abs(dx), Math.abs(dy)) < 24) return;
      hideOverlay();
      move(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up'));
    }, { passive: true });

    window.addEventListener('resize', () => {
      measureBoard();
      for (const tile of tileMap.values()) positionTile(tile, false);
    });

    document.getElementById('newGame').addEventListener('click', () => { ensureAudio(); startGame(); });
    document.getElementById('retryBtn').addEventListener('click', () => { ensureAudio(); startGame(); });
    document.body.addEventListener('pointerdown', ensureAudio, { once: true });

    initBg();
    best = Number(localStorage.getItem(bestKey) || 0);
    startGame();
  </script>
</body>
</html>

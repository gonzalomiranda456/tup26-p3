<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tateti Dinámico</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            height: 100vh;
        }
        h1 {
            color: #333;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 5px;
        }
        .cell {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            border: 2px solid #007BFF;
            cursor: pointer;
            background-color: #fffafa;
            transition: background-color 0.3s;
        }
        .cell:hover {
            background-color: #e0f7fa;
        }
    </style>
</head>
<body>
    <h1>Tateti Dinámico</h1>
    <div class="board" id="board">
        <div class="cell" onclick="play(this)"></div>
        <div class="cell" onclick="play(this)"></div>
        <div class="cell" onclick="play(this)"></div>
        <div class="cell" onclick="play(this)"></div>
        <div class="cell" onclick="play(this)"></div>
        <div class="cell" onclick="play(this)"></div>
        <div class="cell" onclick="play(this)"></div>
        <div class="cell" onclick="play(this)"></div>
        <div class="cell" onclick="play(this)"></div>
    </div>
    <script>
        let currentPlayer = 'X';
        let playerMoves = { 'X': [], 'O': [] };

        function play(cell) {
            if (cell.innerHTML === "") {
                cell.innerHTML = currentPlayer;
                playerMoves[currentPlayer].push(cell);

                if (playerMoves[currentPlayer].length > 3) {
                    playerMoves[currentPlayer][0].innerHTML = "";
                    playerMoves[currentPlayer].shift(); 
                }

                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            }
        }
    </script>
</body>
</html>

<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>1er Parcial</title>
  <meta name="application-name" content="1er Parcial" />
  <meta id="themeColorMeta" name="theme-color" content="#efe3d3" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="1er Parcial" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <style>
    :root {
      color-scheme: light;
      --paper: #f8f3ea;
      --paper-strong: #fffdf8;
      --ink: #1f1b16;
      --muted: #6f6558;
      --line: #d7ccba;
      --accent: #8a5a44;
      --accent-soft: #e9d9c7;
      --ok: #1f7a49;
      --bad: #9f2d2d;
      --code-bg: #1f2430;
      --code-fg: #e6edf3;
      --tok-comment: #8b949e;
      --tok-string: #a5d6a7;
      --tok-number: #f6bd60;
      --tok-keyword: #f28482;
      --tok-type: #84a8ff;
      --tok-command: #84a8ff;
      --tok-var: #ffd166;
      --shadow: 0 24px 80px rgba(47, 37, 24, 0.12);
      --focus-ring: rgba(138, 90, 68, 0.4);
      --bg-glow-a: rgba(138, 90, 68, 0.10);
      --bg-glow-b: rgba(138, 90, 68, 0.08);
      --bg-top: #efe3d3;
      --bg-mid: #f7f2ea;
      --bg-bottom: #efe7dc;
      --hero-bg: linear-gradient(135deg, rgba(247, 243, 234, 0.9), rgba(255, 253, 248, 0.98));
      --hero-border: rgba(138, 90, 68, 0.18);
      --hero-shadow: var(--shadow);
      --hero-compact-shadow: 0 18px 42px rgba(47, 37, 24, 0.14);
      --secondary-bg: #ece3d6;
      --secondary-ink: var(--ink);
      --paper-bg: linear-gradient(180deg, rgba(255,253,248,0.96), rgba(248,243,234,0.98));
      --paper-border: rgba(138, 90, 68, 0.14);
      --paper-header-bg:
        linear-gradient(90deg, rgba(138, 90, 68, 0.08), transparent 26%),
        linear-gradient(180deg, rgba(255,255,255,0.45), transparent);
      --theme-title-ink: #34291f;
      --question-bg: rgba(255,255,255,0.44);
      --question-border: rgba(138, 90, 68, 0.12);
      --inline-code-bg: rgba(138, 90, 68, 0.10);
      --choice-bg: rgba(255,255,255,0.6);
      --choice-bg-hover: rgba(255,255,255,0.92);
      --choice-border: rgba(138, 90, 68, 0.14);
      --choice-border-hover: rgba(138, 90, 68, 0.3);
      --ok-soft: rgba(31, 122, 73, 0.06);
      --ok-border: rgba(31, 122, 73, 0.45);
      --ok-answer-border: rgba(31, 122, 73, 0.35);
      --ok-answer-bg: rgba(31, 122, 73, 0.10);
      --bad-soft: rgba(159, 45, 45, 0.05);
      --bad-border: rgba(159, 45, 45, 0.35);
      --bad-answer-border: rgba(159, 45, 45, 0.28);
      --bad-answer-bg: rgba(159, 45, 45, 0.10);
      --result-border: rgba(138, 90, 68, 0.16);
      --result-bg: linear-gradient(180deg, rgba(255,255,255,0.72), rgba(248,243,234,0.96));
      --bottom-border: rgba(138, 90, 68, 0.18);
      --bottom-bg: linear-gradient(180deg, rgba(255, 253, 248, 0.92), rgba(247, 243, 234, 0.96));
      --bottom-shadow: 0 20px 55px rgba(47, 37, 24, 0.18);
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --paper: #1d1b1a;
      --paper-strong: #262321;
      --ink: #f2e6d7;
      --muted: #c0ae9b;
      --line: #4f4439;
      --accent: #d3a98d;
      --accent-soft: #4d362b;
      --ok: #7ed6a0;
      --bad: #f09090;
      --code-bg: #14181f;
      --code-fg: #ebf0f6;
      --tok-comment: #9aa6b2;
      --tok-string: #b8deb6;
      --tok-number: #f6c177;
      --tok-keyword: #f29d9d;
      --tok-type: #9eb8ff;
      --tok-command: #9eb8ff;
      --tok-var: #f3d98a;
      --shadow: 0 28px 90px rgba(5, 6, 8, 0.42);
      --focus-ring: rgba(211, 169, 141, 0.55);
      --bg-glow-a: rgba(211, 169, 141, 0.09);
      --bg-glow-b: rgba(79, 58, 44, 0.14);
      --bg-top: #131110;
      --bg-mid: #1a1715;
      --bg-bottom: #151311;
      --hero-bg: linear-gradient(135deg, rgba(38, 35, 33, 0.92), rgba(28, 25, 23, 0.98));
      --hero-border: rgba(211, 169, 141, 0.18);
      --hero-shadow: var(--shadow);
      --hero-compact-shadow: 0 18px 42px rgba(5, 6, 8, 0.45);
      --secondary-bg: #2d2926;
      --secondary-ink: var(--ink);
      --paper-bg: linear-gradient(180deg, rgba(31, 28, 26, 0.98), rgba(24, 22, 20, 0.98));
      --paper-border: rgba(211, 169, 141, 0.14);
      --paper-header-bg:
        linear-gradient(90deg, rgba(211, 169, 141, 0.10), transparent 26%),
        linear-gradient(180deg, rgba(255,255,255,0.03), transparent);
      --theme-title-ink: #f0dcc7;
      --question-bg: rgba(255,255,255,0.03);
      --question-border: rgba(211, 169, 141, 0.14);
      --inline-code-bg: rgba(211, 169, 141, 0.14);
      --choice-bg: rgba(255,255,255,0.04);
      --choice-bg-hover: rgba(255,255,255,0.07);
      --choice-border: rgba(211, 169, 141, 0.14);
      --choice-border-hover: rgba(211, 169, 141, 0.28);
      --ok-soft: rgba(126, 214, 160, 0.10);
      --ok-border: rgba(126, 214, 160, 0.45);
      --ok-answer-border: rgba(126, 214, 160, 0.32);
      --ok-answer-bg: rgba(126, 214, 160, 0.12);
      --bad-soft: rgba(240, 144, 144, 0.08);
      --bad-border: rgba(240, 144, 144, 0.35);
      --bad-answer-border: rgba(240, 144, 144, 0.26);
      --bad-answer-bg: rgba(240, 144, 144, 0.12);
      --result-border: rgba(211, 169, 141, 0.14);
      --result-bg: linear-gradient(180deg, rgba(37, 33, 30, 0.95), rgba(25, 23, 21, 0.98));
      --bottom-border: rgba(211, 169, 141, 0.18);
      --bottom-bg: linear-gradient(180deg, rgba(36, 33, 31, 0.94), rgba(24, 22, 20, 0.98));
      --bottom-shadow: 0 20px 55px rgba(0, 0, 0, 0.45);
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        color-scheme: dark;
        --paper: #1d1b1a;
        --paper-strong: #262321;
        --ink: #f2e6d7;
        --muted: #c0ae9b;
        --line: #4f4439;
        --accent: #d3a98d;
        --accent-soft: #4d362b;
        --ok: #7ed6a0;
        --bad: #f09090;
        --code-bg: #14181f;
        --code-fg: #ebf0f6;
        --tok-comment: #9aa6b2;
        --tok-string: #b8deb6;
        --tok-number: #f6c177;
        --tok-keyword: #f29d9d;
        --tok-type: #9eb8ff;
        --tok-command: #9eb8ff;
        --tok-var: #f3d98a;
        --shadow: 0 28px 90px rgba(5, 6, 8, 0.42);
        --focus-ring: rgba(211, 169, 141, 0.55);
        --bg-glow-a: rgba(211, 169, 141, 0.09);
        --bg-glow-b: rgba(79, 58, 44, 0.14);
        --bg-top: #131110;
        --bg-mid: #1a1715;
        --bg-bottom: #151311;
        --hero-bg: linear-gradient(135deg, rgba(38, 35, 33, 0.92), rgba(28, 25, 23, 0.98));
        --hero-border: rgba(211, 169, 141, 0.18);
        --hero-shadow: var(--shadow);
        --hero-compact-shadow: 0 18px 42px rgba(5, 6, 8, 0.45);
        --secondary-bg: #2d2926;
        --secondary-ink: var(--ink);
        --paper-bg: linear-gradient(180deg, rgba(31, 28, 26, 0.98), rgba(24, 22, 20, 0.98));
        --paper-border: rgba(211, 169, 141, 0.14);
        --paper-header-bg:
          linear-gradient(90deg, rgba(211, 169, 141, 0.10), transparent 26%),
          linear-gradient(180deg, rgba(255,255,255,0.03), transparent);
        --theme-title-ink: #f0dcc7;
        --question-bg: rgba(255,255,255,0.03);
        --question-border: rgba(211, 169, 141, 0.14);
        --inline-code-bg: rgba(211, 169, 141, 0.14);
        --choice-bg: rgba(255,255,255,0.04);
        --choice-bg-hover: rgba(255,255,255,0.07);
        --choice-border: rgba(211, 169, 141, 0.14);
        --choice-border-hover: rgba(211, 169, 141, 0.28);
        --ok-soft: rgba(126, 214, 160, 0.10);
        --ok-border: rgba(126, 214, 160, 0.45);
        --ok-answer-border: rgba(126, 214, 160, 0.32);
        --ok-answer-bg: rgba(126, 214, 160, 0.12);
        --bad-soft: rgba(240, 144, 144, 0.08);
        --bad-border: rgba(240, 144, 144, 0.35);
        --bad-answer-border: rgba(240, 144, 144, 0.26);
        --bad-answer-bg: rgba(240, 144, 144, 0.12);
        --result-border: rgba(211, 169, 141, 0.14);
        --result-bg: linear-gradient(180deg, rgba(37, 33, 30, 0.95), rgba(25, 23, 21, 0.98));
        --bottom-border: rgba(211, 169, 141, 0.18);
        --bottom-bg: linear-gradient(180deg, rgba(36, 33, 31, 0.94), rgba(24, 22, 20, 0.98));
        --bottom-shadow: 0 20px 55px rgba(0, 0, 0, 0.45);
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Display",
        "SF Pro Text", "Segoe UI", Inter, Roboto, "Helvetica Neue", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, var(--bg-glow-a), transparent 28%),
        radial-gradient(circle at bottom right, var(--bg-glow-b), transparent 24%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 16%, var(--bg-bottom) 100%);
    }

    .shell {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 10px calc(74px + env(safe-area-inset-bottom, 0px));
    }

    .hero {
      background: var(--hero-bg);
      border: 1px solid var(--hero-border);
      border-radius: 8px;
      box-shadow: var(--hero-shadow);
      padding: 10px;
      position: sticky;
      top: 0;
      z-index: 30;
      backdrop-filter: blur(14px);
      overflow: hidden;
      transition: padding 180ms ease, border-radius 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .hero.measuring,
    .hero.measuring * {
      transition: none !important;
    }

    .hero.compact {
      padding-top: 14px;
      padding-bottom: 14px;
      border-top-left-radius: 0;
      border-top-right-radius: 0;
      box-shadow: var(--hero-compact-shadow);
    }

    .eyebrow {
      margin: 0 0 10px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
      font-family: "Helvetica Neue", Arial, sans-serif;
      max-height: 2rem;
      transition: opacity 160ms ease, transform 160ms ease, max-height 180ms ease, margin 180ms ease;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 0.96;
      letter-spacing: -0.04em;
      transition: font-size 180ms ease, margin 180ms ease;
    }

    .hero-timer {
      position: absolute;
      top: 12px;
      right: 68px;
      min-width: 104px;
      padding: 7px 12px;
      border: 1px solid var(--choice-border);
      border-radius: 8px;
      background: var(--choice-bg-hover);
      color: var(--ink);
      font: 800 1.15rem/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      text-align: center;
      box-shadow: 0 10px 24px rgba(47, 37, 24, 0.12);
    }

    body:not([data-screen="exam"]) .hero-timer {
      display: none;
    }

    .lead {
      margin: 0;
      max-width: 70ch;
      color: var(--muted);
      font-size: 1.05rem;
      max-height: 6rem;
      transition: opacity 160ms ease, transform 160ms ease, max-height 180ms ease, margin 180ms ease;
    }

    .theme-toggle {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 50%;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.55);
      color: var(--ink);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(47, 37, 24, 0.12);
      transition: transform 120ms ease, opacity 120ms ease, background 120ms ease, box-shadow 120ms ease;
    }

    .theme-toggle:hover,
    .bottom-bar button:hover {
      transform: translateY(-1px);
    }

    .theme-toggle:focus-visible,
    .bottom-bar button:focus-visible {
      outline: 2px solid var(--focus-ring);
      outline-offset: 3px;
    }

    :root[data-theme="dark"] .theme-toggle {
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 18px;
      color: var(--muted);
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-size: 0.95rem;
      max-height: 4rem;
      transition: opacity 160ms ease, transform 160ms ease, max-height 180ms ease, margin 180ms ease;
    }

    .meta strong {
      color: var(--ink);
    }

    .hero.compact h1 {
      margin: 0;
      font-size: clamp(1.35rem, 2.5vw, 1.8rem);
    }

    .hero.compact .hero-timer {
      top: 10px;
      font-size: 1rem;
    }

    .hero.compact .eyebrow,
    .hero.compact .lead,
    .hero.compact .meta {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      max-height: 0;
      margin-top: 0;
      margin-bottom: 0;
      overflow: hidden;
      transform: translateY(-10px);
    }

    .exam-paper {
      margin-top: 26px;
      background: var(--paper-bg);
      border: 1px solid var(--paper-border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .paper-header {
      padding: 28px 32px;
      border-bottom: 1px solid var(--line);
      background: var(--paper-header-bg);
      border-radius: 8px 8px 0 0;
    }

    .paper-title {
      margin: 0;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      line-height: 1.05;
    }

    .paper-subtitle {
      margin: 10px 0 0;
      color: var(--muted);
    }

    .theme {
      padding: 8px 4px;
    }

    .theme + .theme {
      border-top: 1px solid rgba(138, 90, 68, 0.08);
    }

    .theme-title {
      margin: 0 12px 18px;
      font-size: 1.55rem;
      color: var(--theme-title-ink);
      border-bottom: 2px solid var(--accent-soft);
      padding-bottom: 10px;
    }

    .question {
      background: var(--question-bg);
      border: 0;
      border-radius: 0;
      padding: 8px 4px;
      margin: 0 0 10px;
    }

    .question + .question {
      border-top: 2px solid var(--choice-border-hover);
      padding-top: 12px;
    }

    .question-title {
      padding-top: 10px;
      margin: 0 0 10px;
      font-size: 1.2rem;
    }

    .question-body p {
      margin: 0 0 12px;
      font-size: 1.02rem;
    }

    .question-body p strong { font-weight: 700; }
    .question-body p em { font-style: italic; }
    .question-title code,
    .question-body code,
    .choice-text code {
      background: var(--inline-code-bg);
      border-radius: 0.4em;
      padding: 0.08em 0.35em;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.94em;
    }

    pre {
      margin: 14px 0 16px;
      padding: 16px 18px;
      background: var(--code-bg);
      color: var(--code-fg);
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }

    pre code {
      background: none !important;
      padding: 0 !important;
      border-radius: 0 !important;
      color: inherit;
      display: block;
      line-height: 1.55;
      font-size: 0.95rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .tok-comment { color: var(--tok-comment); }
    .tok-string  { color: var(--tok-string);  }
    .tok-char    { color: var(--tok-string);  }
    .tok-number  { color: var(--tok-number);  }
    .tok-keyword { color: var(--tok-keyword); font-weight: 700; }
    .tok-type    { color: var(--tok-type);    }
    .tok-command { color: var(--tok-command); font-weight: 700; }
    .tok-var     { color: var(--tok-var);     }

    .choices {
      display: grid;
      gap: 4px;
      margin-top: 10px;
    }

    .choice {
        display: grid;
        grid-template-columns: 28px 1fr;
        gap: 4px;
        align-items: start;
        padding: 8px 8px;
        background: var(--choice-bg);
        border: 1px solid var(--choice-border);
        border-radius: 8px;
        cursor: pointer;
        transition: border-color 120ms ease, background 120ms ease, transform 120ms ease;
    }
    .choice:hover {
      background: var(--choice-bg-hover);
      border-color: var(--choice-border-hover);
      transform: translateY(-1px);
    }

    .choice input[type="checkbox"] {
      margin-top: 2px;
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    .choice-text {
      line-height: 1.45;
    }

    .question.answered .question-title::after {
      content: " Respondida";
      font-size: 0.8rem;
      color: var(--ok);
      font-family: "Helvetica Neue", Arial, sans-serif;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-left: 10px;
    }

    .choice.selected {
      border-color: var(--ok-border);
      background: var(--ok-soft);
    }

    .start-screen,
    .result-screen {
      padding: 32px;
    }

    .start-panel,
    .result-panel {
      max-width: 760px;
    }

    .start-panel h3,
    .result-panel h3 {
      margin: 0 0 12px;
      font-size: clamp(1.4rem, 3vw, 2rem);
    }

    .result-nav {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) 44px;
      align-items: center;
      gap: 10px;
      width: 100%;
      margin: 0 0 16px;
    }

    .result-nav h3 {
      margin: 0;
      text-align: center;
      white-space: nowrap;
    }

    .result-nav-button {
      width: 44px;
      height: 44px;
      border: 1px solid var(--choice-border);
      border-radius: 8px;
      background: var(--choice-bg);
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
    }

    .result-nav-button img {
      width: 24px;
      height: 24px;
      display: block;
    }

    .result-nav-button.next img {
      transform: rotate(180deg);
    }

    .result-nav-button:disabled {
      cursor: not-allowed;
      opacity: 0.32;
    }

    .welcome-message {
      margin: 18px 0;
      padding: 18px;
      border: 1px solid var(--choice-border);
      border-radius: 8px;
      background: var(--choice-bg);
      color: var(--ink);
      line-height: 1.55;
    }

    .field-row {
      display: grid;
      gap: 8px;
      margin-top: 18px;
      max-width: 360px;
    }

    .field-row label {
      font-weight: 700;
      color: var(--ink);
    }

    .field-row input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--choice-border);
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--paper-strong);
      color: var(--ink);
      font: inherit;
    }

    .form-message {
      min-height: 1.35em;
      margin: 8px 0 0;
      color: var(--bad);
      font-weight: 700;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .primary-button,
    .secondary-button {
      min-height: 44px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 10px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease, background 120ms ease;
    }

    .primary-button {
      background: var(--accent);
      color: #fffdf8;
    }

    .secondary-button {
      background: var(--secondary-bg);
      color: var(--secondary-ink);
      border-color: var(--choice-border);
    }

    .primary-button:hover,
    .secondary-button:hover {
      transform: translateY(-1px);
    }

    .primary-button:disabled,
    .secondary-button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
      transform: none;
    }

    .exam-summary,
    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin: 16px 0;
    }

    .exam-summary {
      grid-template-columns: minmax(0, 2fr) minmax(0, 1fr) minmax(0, 1fr);
    }

    .metric {
      min-width: 0;
      padding: 14px;
      border: 1px solid var(--choice-border);
      border-radius: 8px;
      background: var(--choice-bg);
    }

    .metric strong {
      display: block;
      font-size: 1.35rem;
      color: var(--ink);
    }

    .metric span {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .result-code {
      width: 100%;

<body data-screen="loading">
  <div class="shell">
    <section id="hero" class="hero">
      <button id="themeToggleButton" class="theme-toggle" type="button" aria-label="Cambiar tema" aria-pressed="false">🌙</button>
      <p class="eyebrow">1<sup>er</sup> Parcial</p>
      <h1 id="heroTitle">TUP26 - P3 : 1<sup>er</sup> Parcial</h1>
      <div id="heroTimer" class="hero-timer" aria-live="polite">60:00</div>
      <p class="lead">
      </p>
    </section>

    <main class="exam-paper">
      <header class="paper-header">
        <h2 class="paper-title">1<sup>er</sup> Parcial de Programación III</h2>
      </header>

      <div id="examContainer" class="empty-state">
        Preparando el examen...
      </div>
    </main>
  </div>

  <footer class="bottom-bar">
    <div class="bottom-status">
      <button id="progress" class="progress-count" type="button" aria-label="Ir a la primera pregunta sin responder">0 / 0</button>
    </div>
    <button id="finishButton" class="primary-button" type="button" disabled>Finalizar examen</button>
  </footer>

  <script src="./generador.js"></script>
  <script>
    const APP_NAME = "1er Parcial";
    const DEFAULT_MARKDOWN_FILE = "examen.md";
    const STUDENTS_FILE = "alumnos.md";
    const THEME_STORAGE_KEY = "examinador-theme";
    const SESSION_STORAGE_KEY = "primer-parcial-sesion";
    const PRACTICE_QUESTION_COUNT = 60;
    const FULL_EXAM_QUESTION_COUNT = 60;
    const FULL_EXAM_START_DATE = new Date(2026, 4, 12);
    const MAX_ATTEMPTS = 5;
    const EXAM_DURATION_MS = 60 * 60 * 1000;
    const EXIT_DEDUPE_MS = 1500;
    const INTEGRITY_MESSAGE_TIMEOUT_MS = 6500;
    const EXIT_WARNING_MESSAGE = "Detectamos que saliste de la pantalla. Si vuelve a pasar, este intento se anulará y comenzará uno nuevo.";
    const EXIT_RESET_MESSAGE = "El intento anterior se anuló porque saliste de la pantalla. Se inició un nuevo intento.";
    const EXIT_BLOCKED_MESSAGE = "El intento se anuló porque saliste de la pantalla y ya no quedan intentos disponibles.";
    const CHEVRON_LEFT_ICON = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9ImN1cnJlbnRDb2xvciIgc3Ryb2tlLXdpZHRoPSIyIiBzdHJva2UtbGluZWNhcD0icm91bmQiIHN0cm9rZS1saW5lam9pbj0icm91bmQiIGNsYXNzPSJsdWNpZGUgbHVjaWRlLWNoZXZyb24tbGVmdC1pY29uIGx1Y2lkZS1jaGV2cm9uLWxlZnQiPjxwYXRoIGQ9Im0xNSAxOC02LTYgNi02Ii8+PC9zdmc+";

    function getExamQuestionCount(now = new Date()) {
      return now >= FULL_EXAM_START_DATE ? FULL_EXAM_QUESTION_COUNT : PRACTICE_QUESTION_COUNT;
    }

    const state = {
      exam: null,
      students: new Map(),
      student: null,
      attempt: 1,
      deadlineAt: null,
      allQuestions: [],
      currentQuestions: [],
      answers: new Map(),
      result: null,
      resultHistory: [],
      screen: "loading",
      currentFileName: DEFAULT_MARKDOWN_FILE,
      exitWarnings: 0,
      lastExitAt: 0,
      integrityMessage: "",
      attemptBlocked: false,
    };

    const heroMetrics = {
      expandedHeight: 0,
      compactHeight: 0,
    };

    const hero = document.getElementById("hero");
    const heroTitle = document.getElementById("heroTitle");
    const examContainer = document.getElementById("examContainer");
    const themeToggleButton = document.getElementById("themeToggleButton");
    const themeColorMeta = document.getElementById("themeColorMeta");
    const progress = document.getElementById("progress");
    const heroTimer = document.getElementById("heroTimer");
    const finishButton = document.getElementById("finishButton");
    const preferredDarkScheme = window.matchMedia("(prefers-color-scheme: dark)");
    const THEME_COLORS = {
      light: "#efe3d3",
      dark:  "#131110",
    };
    let integrityMessageTimer = 0;

    initTheme();

    themeToggleButton.addEventListener("click", () => {
      const currentTheme = getEffectiveTheme();
      applyTheme(currentTheme === "dark" ? "light" : "dark");
      measureHeroHeights();
      syncHeroState();
    });
    finishButton.addEventListener("click", finishExam);
    progress.addEventListener("click", scrollToFirstUnansweredQuestion);

    window.addEventListener("scroll", syncHeroState, { passive: true });
    window.addEventListener("resize", handleViewportChange, { passive: true });
    window.addEventListener("blur", () => handleScreenExit("blur"), { passive: true });
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        handleScreenExit("visibilitychange");
      }
    });
    window.setInterval(updateMeta, 1000);

    if (typeof preferredDarkScheme.addEventListener === "function") {
      preferredDarkScheme.addEventListener("change", handleSystemThemeChange);
    } else if (typeof preferredDarkScheme.addListener === "function") {
      preferredDarkScheme.addListener(handleSystemThemeChange);
    }

    async function boot() {
      try {
        const [examResponse, studentsResponse] = await Promise.all([
          fetch(DEFAULT_MARKDOWN_FILE, { cache: "no-cache" }),
          fetch(STUDENTS_FILE, { cache: "no-cache" }),
        ]);

        if (!examResponse.ok) {
          throw new Error(`No se pudo cargar ${DEFAULT_MARKDOWN_FILE}`);
        }

        if (!studentsResponse.ok) {
          throw new Error(`No se pudo cargar ${STUDENTS_FILE}`);
        }

        const [examMarkdown, studentsMarkdown] = await Promise.all([
          examResponse.text(),
          studentsResponse.text(),
        ]);

        if (!examMarkdown.trim() || !studentsMarkdown.trim()) {
          throw new Error("Archivo vacio");
        }

        loadExamFromMarkdown(examMarkdown, DEFAULT_MARKDOWN_FILE);
        state.students = parseStudents(studentsMarkdown);
        restoreSession();
        renderStartScreen();
      } catch (error) {
        examContainer.className = "empty-state";
        examContainer.textContent = window.location.protocol === "file:"
          ? "No pude cargar los datos. Abrí esta página desde un servidor local para permitir la lectura de los archivos."
          : "No pude cargar los datos del examen. Verificá que examen.md y alumnos.md estén junto a index.html.";
      }
    }

    function initTheme() {
      try {
        const storedTheme = localStorage.getItem(THEME_STORAGE_KEY);
        if (storedTheme === "light" || storedTheme === "dark") {
          document.documentElement.dataset.theme = storedTheme;
        }
      } catch {
        // Si localStorage no está disponible, usamos el tema del sistema.
      }

      updateThemeColor();
      updateThemeToggle();
    }

    function applyTheme(theme) {
      document.documentElement.dataset.theme = theme;

      try {
        localStorage.setItem(THEME_STORAGE_KEY, theme);
      } catch {
        // Ignoramos errores de persistencia y seguimos con el tema actual.
      }

      updateThemeToggle();
      updateThemeColor();
    }

    function getStoredTheme() {
      try {
        const storedTheme = localStorage.getItem(THEME_STORAGE_KEY);
        return storedTheme === "light" || storedTheme === "dark" ? storedTheme : null;
      } catch {
        return null;
      }
    }

    function getEffectiveTheme() {
      const explicitTheme = document.documentElement.dataset.theme;
      if (explicitTheme === "light" || explicitTheme === "dark") {
        return explicitTheme;
      }

      return preferredDarkScheme.matches ? "dark" : "light";
    }

    function updateThemeToggle() {
      const isDark = getEffectiveTheme() === "dark";
      themeToggleButton.textContent = isDark ? "☀️" : "🌙";
      themeToggleButton.setAttribute("aria-label", isDark ? "Activar modo claro" : "Activar modo oscuro");
      themeToggleButton.title = isDark ? "Modo claro" : "Modo oscuro";
      themeToggleButton.setAttribute("aria-pressed", String(isDark));
    }

    function updateThemeColor() {
      themeColorMeta.content = THEME_COLORS[getEffectiveTheme()];
    }

    function handleSystemThemeChange() {
      if (getStoredTheme()) {
        return;
      }

      updateThemeColor();
      updateThemeToggle();
      measureHeroHeights();
      syncHeroState();
    }

    function syncHeroState() {
      const collapseY = getHeroCollapseThreshold();
      const expandY = 4;
      const shouldCompact = hero.classList.contains("compact")
        ? window.scrollY > expandY
        : window.scrollY > collapseY;

      hero.classList.toggle("compact", shouldCompact);
    }

    function handleViewportChange() {
      measureHeroHeights();
      syncHeroState();
    }

    function measureHeroHeights() {
      const scrollTop = window.scrollY;
      const wasCompact = hero.classList.contains("compact");

      hero.classList.add("measuring");
      hero.classList.remove("compact");
      heroMetrics.expandedHeight = hero.offsetHeight;
      hero.classList.add("compact");
      heroMetrics.compactHeight = hero.offsetHeight;
      hero.classList.toggle("compact", wasCompact);
      hero.classList.remove("measuring");
      window.scrollTo(0, scrollTop);
    }

    function getHeroCollapseThreshold() {
      const delta = Math.max(0, heroMetrics.expandedHeight - heroMetrics.compactHeight);
      return Math.max(72, delta + 8);
    }

    function loadExamFromMarkdown(markdown, sourceName) {
      state.exam = parseExam(markdown);
      state.currentFileName = sourceName;
      state.allQuestions = state.exam.themes.flatMap((theme) =>
        theme.questions.map((question) => ({ ...question, themeTitle: theme.title }))
      );
      state.answers = new Map();
      updateMeta();
      measureHeroHeights();
      syncHeroState();
    }

    function restoreSession() {
      try {
        const saved = JSON.parse(localStorage.getItem(SESSION_STORAGE_KEY) || "{}");
        const student = state.students.get(String(saved.legajo || ""));
        if (!student) {
          return;
        }

        state.student = student;
        state.attempt = clampInteger(saved.attempt, 1, MAX_ATTEMPTS);
        state.deadlineAt = Number.isFinite(saved.deadlineAt) ? saved.deadlineAt : null;
        state.attemptBlocked = Boolean(saved.attemptBlocked);
        state.resultHistory = Array.isArray(saved.resultHistory)
          ? saved.resultHistory.map(normalizeResultSnapshot).filter(isValidResultSnapshot).slice(-MAX_ATTEMPTS)
          : [];
      } catch {
        // Si no hay sesión guardada, se arranca desde la validación de legajo.
      }
    }

    function persistSession() {
      try {
        const payload = {
          legajo: state.student?.legajo || "",
          attempt: state.attempt,
          deadlineAt: state.deadlineAt,
          attemptBlocked: state.attemptBlocked,
          resultHistory: state.resultHistory.map(normalizeResultSnapshot).filter(isValidResultSnapshot),
        };
        localStorage.setItem(SESSION_STORAGE_KEY, JSON.stringify(payload));
      } catch {
        // Si falla localStorage, la app sigue funcionando en memoria.
      }
    }

    function isValidResultSnapshot(result) {
      return result
        && Number.isInteger(result.attempt)
        && result.attempt >= 1
        && result.attempt <= MAX_ATTEMPTS
        && typeof result.code === "string";
    }

    function normalizeResultSnapshot(result) {
      if (!result || typeof result !== "object") {
        return result;
      }

      const snapshot = { ...result };
      const codeParts = String(snapshot.code || "").split(".");
      if ((codeParts.length === 3 || codeParts.length === 4) && Number.isFinite(snapshot.grade)) {
        const encodedAttemptAndGrade = snapshot.attempt * 10 + (getCodeGrade(snapshot.grade) - 1);
        const base = `${codeParts[0]}.${encodedAttemptAndGrade}.${codeParts[2]}`;
        snapshot.code = `${base}.${calcularSumaDeControl(base)}`;
      }

      return snapshot;
    }

    function clampInteger(value, min, max) {
      const number = Number.parseInt(String(value), 10);
      if (!Number.isFinite(number)) return min;
      return Math.min(max, Math.max(min, number));
    }

    function parseExam(markdown) {
      const lines = markdown.replace(/\r\n/g, "\n").split("\n");
      const themes = [];
      let examTitle = "Examen";
      let currentTheme = null;
      let currentQuestion = null;
      let questionId = 0;

      function ensureTheme(title) {
        const theme = { title, questions: [] };
        themes.push(theme);
        currentTheme = theme;
      }

      function pushQuestion() {
        if (!currentQuestion) return;
        if (!currentTheme) {
          ensureTheme(APP_NAME);
        }
        currentQuestion.bodyMarkdown = currentQuestion.bodyLines.join("\n").trim();
        currentQuestion.number = extractQuestionNumber(currentQuestion.bodyMarkdown) ?? questionId;
        currentQuestion.correctIndex = currentQuestion.options.findIndex((option) => option.correct);
        delete currentQuestion.bodyLines;
        currentTheme.questions.push(currentQuestion);
        currentQuestion = null;
      }

      for (const rawLine of lines) {
        const line = rawLine ?? "";
        const trimmed = line.trim();

        if (/^---+$/.test(trimmed)) {
          continue;
        }

        if (trimmed.startsWith("# ") && !trimmed.startsWith("## ")) {
          examTitle = trimmed.slice(2).trim() || "Examen";
          continue;
        }

        if (trimmed.startsWith("## ")) {
          pushQuestion();
          ensureTheme(trimmed.slice(3).trim());
          continue;
        }

        if (trimmed.startsWith("### ")) {
          pushQuestion();
          questionId += 1;
          currentQuestion = {
            id: `q${questionId}`,
            title: trimmed.slice(4).trim(),
            bodyLines: [],
            options: [],
          };
          continue;
        }

        if (!currentQuestion) {
          continue;
        }

        const optionMatch = line.match(/^\s*-\s+\[([xX\s])\]\s+(.*)$/);
        if (optionMatch) {
          currentQuestion.options.push({
            text: optionMatch[2],
            correct: optionMatch[1].toLowerCase() === "x",
          });
          continue;
        }

        currentQuestion.bodyLines.push(line);
      }

      pushQuestion();

      return {
        title: examTitle,
        themes,
        totalQuestions: themes.reduce((acc, theme) => acc + theme.questions.length, 0),
      };
    }

    function extractQuestionNumber(markdown) {
      const match = markdown.match(/^\s*(\d+)[).]/m);
      return match ? Number(match[1]) : null;
    }

    function parseStudents(markdown) {
      const students = new Map();
      const lines = markdown.replace(/\r\n/g, "\n").split("\n");

      for (const line of lines) {
        const fields = line.trim().split(/\s{2,}/);
        const legajo = fields[0]?.match(/^\d{5}$/)?.[0];
        if (!legajo || !fields[1]) continue;

        const attendanceValue = Number.parseInt(fields[fields.length - 1], 10);
        const greenMarks = (line.match(/🟢/g) || []).length;
        students.set(legajo, {
          legajo,
          nombre: fields[1].trim(),
          nombreSaludo: formatStudentName(fields[1].trim()),
          asistencias: Number.isFinite(attendanceValue) ? attendanceValue : greenMarks,
        });
      }

      return students;
    }

    function formatStudentName(rawName) {
      const parts = rawName.split(",").map((part) => part.trim()).filter(Boolean);
      if (parts.length < 2) {
        return rawName.trim();
      }

      return `${parts.slice(1).join(" ")} ${parts[0]}`.replace(/\s+/g, " ").trim();
    }

    function renderStartScreen(message = "") {
      setScreen("start");
      clearIntegrityMessageTimer();
      state.answers = new Map();
      state.currentQuestions = [];
      state.result = null;
      state.exitWarnings = 0;
      state.lastExitAt = 0;
      state.integrityMessage = "";
      examContainer.className = "start-screen";
      examContainer.innerHTML = `
        <section class="start-panel">
          <h3>Ingresá tu legajo</h3>
          <p class="paper-subtitle">Usá el legajo con el que figurás en la lista de alumnos.</p>
          <form id="legajoForm" novalidate>
            <div class="field-row">
              <label for="legajoInput">Legajo</label>
              <input id="legajoInput" name="legajo" inputmode="numeric" autocomplete="off" required />
            </div>
            <p id="legajoMessage" class="form-message">${escapeHtml(message)}</p>
            <div id="welcomeBox"></div>
            <div class="actions">
              <button id="startButton" class="primary-button" type="submit" disabled>Comenzar el examen</button>
            </div>
          </form>
        </section>
      `;

      const legajoInput = document.getElementById("legajoInput");
      const legajoForm = document.getElementById("legajoForm");
      const startButton = document.getElementById("startButton");

      if (state.student) {
        legajoInput.value = state.student.legajo;
        validateLegajo(legajoInput.value);
      }

      legajoInput.addEventListener("input", () => validateLegajo(legajoInput.value));
      legajoForm.addEventListener("submit", (event) => {
        event.preventDefault();
        if (validateLegajo(legajoInput.value)) {
          resetExamRun();
          beginExam();
        }
      });

      function validateLegajo(value) {
        const legajo = String(value || "").trim();
        const student = state.students.get(legajo);
        const messageNode = document.getElementById("legajoMessage");
        const welcomeBox = document.getElementById("welcomeBox");

        if (!legajo) {
          state.student = null;
          messageNode.textContent = "";
          welcomeBox.innerHTML = "";
          startButton.disabled = true;
          updateMeta();
          return false;
        }

        if (!student) {
          state.student = null;
          messageNode.textContent = "No encontré ese legajo. Revisá el número e intentá otra vez.";
          welcomeBox.innerHTML = "";
          startButton.disabled = true;
          updateMeta();
          return false;
        }

        const previousLegajo = state.student?.legajo;
        state.student = student;
        if (previousLegajo !== legajo) {
          state.deadlineAt = null;
          state.attempt = 1;
          state.attemptBlocked = false;
        }

        messageNode.textContent = "";
        welcomeBox.innerHTML = `
          <div class="welcome-message">
            Hola, <strong>${escapeHtml(student.nombreSaludo)}</strong>.<br><br>
            Tenés 1 hora para completar el examen.<br><br>
            Al finalizar, vas a recibir un código para compartir por WhatsApp en el grupo de la comisión.<br><br>
            <small>Podés repetir el examen mientras siga disponible el tiempo. Se tomará tu mejor resultado.</small>
          </div>
        `;
        startButton.disabled = false;
        persistSession();
        updateMeta();
        return !startButton.disabled;
      }
    }

    function resetExamRun() {
      state.attempt = 1;
      state.deadlineAt = null;
      state.currentQuestions = [];
      state.answers = new Map();
      state.result = null;
      state.resultHistory = [];
      state.exitWarnings = 0;
      state.lastExitAt = 0;
      state.integrityMessage = "";
      state.attemptBlocked = false;
      persistSession();
    }

    function beginExam(options = {}) {
      if (!state.student || isTimeExpired() || state.attempt > MAX_ATTEMPTS || state.attemptBlocked) {
        renderStartScreen("No se puede comenzar el examen. Revisá el legajo, el tiempo disponible o el número de intento.");
        return;
      }

      if (!state.deadlineAt) {
        state.deadlineAt = Date.now() + EXAM_DURATION_MS;
      }

      const questionCount = getExamQuestionCount();
      const questionIndexes = GenerarExamen(getSeed(), questionCount, state.allQuestions.length);
      state.currentQuestions = questionIndexes
        .map((number) => state.allQuestions[number - 1])
        .filter((question) => question && Number.isInteger(question.correctIndex) && question.correctIndex >= 0)
        .sort((a, b) => a.number - b.number);
      state.answers = new Map();
      state.result = null;
      state.exitWarnings = 0;
      state.lastExitAt = options.preserveExitDedupe ? state.lastExitAt : 0;
      setScreen("exam");
      persistSession();
      renderExam();
      scheduleIntegrityMessageClear();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function getSeed() {
      return Number.parseInt(`${state.student.legajo}${state.attempt}`, 10);
    }

    function renderExam() {
      if (!state.exam || state.currentQuestions.length === 0) {
        examContainer.className = "empty-state";
        examContainer.textContent = "No encontré preguntas válidas para generar este intento.";
        return;
      }

      examContainer.className = "";
      examContainer.innerHTML = `
        <section class="theme">
          ${renderIntegrityMessage()}
          <div class="exam-summary">
            <div class="metric"><strong>${escapeHtml(state.student.nombreSaludo)}</strong><span>Alumno</span></div>
            <div class="metric"><strong>${state.attempt} / ${MAX_ATTEMPTS}</strong><span>Intento actual</span></div>
            <div class="metric"><strong>${state.currentQuestions.length}</strong><span>Preguntas</span></div>
          </div>
          ${state.currentQuestions.map(renderQuestion).join("")}
        </section>
      `;

      examContainer.querySelectorAll('input[type="radio"]').forEach((input) => {
        input.addEventListener("change", handleChoiceChange);
      });

      updateMeta();
    }

    function showTemporaryIntegrityMessage(message) {
      state.integrityMessage = message;
      persistSession();
      renderExam();
      scheduleIntegrityMessageClear();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function scheduleIntegrityMessageClear() {
      clearIntegrityMessageTimer();
      if (!state.integrityMessage || state.screen !== "exam") {
        return;
      }

      const message = state.integrityMessage;
      integrityMessageTimer = window.setTimeout(() => {
        if (state.screen !== "exam" || state.integrityMessage !== message) {
          return;
        }

        state.integrityMessage = "";
        persistSession();
        renderExam();
      }, INTEGRITY_MESSAGE_TIMEOUT_MS);
    }

    function clearIntegrityMessageTimer() {
      if (!integrityMessageTimer) {
        return;
      }

      window.clearTimeout(integrityMessageTimer);
      integrityMessageTimer = 0;
    }

    function renderIntegrityMessage() {
      if (!state.integrityMessage) {
        return "";
      }

      return `<div class="integrity-alert" role="alert">${escapeHtml(state.integrityMessage)}</div>`;
    }

    function renderQuestion(question, index) {
      const answeredIndex = state.answers.get(question.id);
      const answered = Number.isInteger(answeredIndex);
      const classes = [
        "question",
        answered ? "answered" : "",
      ].filter(Boolean).join(" ");

      return `
        <article class="${classes}" data-question-id="${question.id}">
          <h3 class="question-title">${index + 1}. ${renderInlineMarkdown(question.title)}</h3>
          <div class="question-body">${renderMarkdown(stripQuestionNumber(question.bodyMarkdown))}</div>
          <div class="choices">
            ${question.options.map((option, index) => renderChoice(question, option, index, answeredIndex)).join("")}
          </div>
        </article>
      `;
    }

    function stripQuestionNumber(markdown) {
      return markdown.replace(/^\s*\d+[).]\s*/, "");
    }

    function renderChoice(question, option, index, answeredIndex) {
      const checked = answeredIndex === index ? "checked" : "";
      const extraClass = [
        "choice",
        answeredIndex === index ? "selected" : "",
      ].filter(Boolean).join(" ");

      return `
        <label class="${extraClass}">
          <input
            type="radio"
            name="${question.id}"
            data-question-id="${question.id}"
            data-option-index="${index}"
            ${checked}
          />
          <span class="choice-text">${renderInlineMarkdown(option.text)}</span>
        </label>
      `;
    }

    function handleChoiceChange(event) {
      const input = event.target;
      const questionId = input.dataset.questionId;
      const optionIndex = Number(input.dataset.optionIndex);
      const questionInputs = examContainer.querySelectorAll(`input[data-question-id="${CSS.escape(questionId)}"]`);

      if (!input.checked) return;
      const wasAlreadyAnswered = state.answers.has(questionId);
      state.answers.set(questionId, optionIndex);

      const article = input.closest(".question");
      article.classList.toggle("answered", state.answers.has(questionId));
      questionInputs.forEach((checkbox) => {
        checkbox.closest(".choice")?.classList.toggle("selected", checkbox.checked);
      });

      updateMeta();
      if (!wasAlreadyAnswered) {
        scrollToNextUnansweredQuestion(questionId);
      }
    }

    function scrollToNextUnansweredQuestion(questionId) {
      const currentIndex = state.currentQuestions.findIndex((question) => question.id === questionId);
      if (currentIndex < 0 || state.answers.size >= state.currentQuestions.length) {
        return;
      }

      const nextQuestion = state.currentQuestions
        .slice(currentIndex + 1)
        .find((question) => !state.answers.has(question.id))
        || state.currentQuestions.find((question) => !state.answers.has(question.id));

      if (!nextQuestion) {
        return;
      }

      const article = examContainer.querySelector(`[data-question-id="${CSS.escape(nextQuestion.id)}"]`);
      if (!article) {
        return;
      }

      window.setTimeout(() => scrollQuestionFullyIntoView(article), 80);
    }

    function scrollQuestionFullyIntoView(article, behavior = "smooth") {
      const heroOffset = hero.getBoundingClientRect().height + 14;
      const bottomBar = document.querySelector(".bottom-bar");
      const bottomOffset = bottomBar && getComputedStyle(bottomBar).display !== "none"
        ? bottomBar.getBoundingClientRect().height + 14
        : 14;
      const availableHeight = window.innerHeight - heroOffset - bottomOffset;
      const rect = article.getBoundingClientRect();
      const isFullyVisible = rect.top >= heroOffset && rect.bottom <= window.innerHeight - bottomOffset;

      if (isFullyVisible) {
        return;
      }

      const articleTop = rect.top + window.scrollY;
      const articleBottom = rect.bottom + window.scrollY;
      const targetTop = rect.height <= availableHeight
        ? articleBottom - (window.innerHeight - bottomOffset)
        : articleTop - heroOffset;

      window.scrollTo({
        top: Math.max(0, targetTop),
        behavior,
      });
    }

    function scrollToFirstUnansweredQuestion() {
      if (state.screen !== "exam" || state.answers.size >= state.currentQuestions.length) {
        return;
      }

      const firstUnanswered = state.currentQuestions.find((question) => !state.answers.has(question.id));
      if (!firstUnanswered) {
        return;
      }

      const article = examContainer.querySelector(`[data-question-id="${CSS.escape(firstUnanswered.id)}"]`);
      if (!article) {
        return;
      }

      scrollQuestionFullyIntoView(article, "auto");
      article.querySelector('input[type="radio"]')?.focus({ preventScroll: true });
    }

    function handleScreenExit(reason) {
      if (state.screen !== "exam" || state.attemptBlocked) {
        return;
      }

      const now = Date.now();
      if (now - state.lastExitAt < EXIT_DEDUPE_MS) {
        return;
      }

      state.lastExitAt = now;
      state.exitWarnings += 1;

      if (state.exitWarnings === 1) {
        showTemporaryIntegrityMessage(EXIT_WARNING_MESSAGE);
        return;
      }

      cancelAttemptAfterScreenExit(reason);
    }

    function cancelAttemptAfterScreenExit(reason) {
      state.answers = new Map();
      state.currentQuestions = [];
      state.result = null;
      state.exitWarnings = 0;
      state.lastExitAt = Date.now();

      if (state.attempt >= MAX_ATTEMPTS) {
        state.attemptBlocked = true;
        state.integrityMessage = "";
        persistSession();
        renderStartScreen(EXIT_BLOCKED_MESSAGE);
        return;
      }

      state.attempt += 1;
      state.integrityMessage = EXIT_RESET_MESSAGE;
      persistSession();
      beginExam({ preserveExitDedupe: true });
    }

    function finishExam() {
      if (state.screen !== "exam" || state.attemptBlocked || state.answers.size !== state.currentQuestions.length) {
        return;
      }

      const correctCount = state.currentQuestions.reduce((total, question) => {
        return total + (state.answers.get(question.id) === question.correctIndex ? 1 : 0);
      }, 0);
      
      const attendanceCredits = Math.floor(state.student.asistencias / 3 + 0.5);
      const credits = correctCount + attendanceCredits - 20 + 3; // -20 son para anular el azar, + 3 para compensar errores en las preguntas.
      const grade = clampNumber(credits / 4.0 + 0.5, 1, 10);
      const encodedAttemptAndGrade = state.attempt * 10 + (getCodeGrade(grade) - 1);
      const answerDigits = state.currentQuestions.map((question) => state.answers.get(question.id));
      const encodedAnswers = ConvertirBase(answerDigits, 3, 32);

      state.result = {
        attempt: state.attempt,
        questionCount: state.currentQuestions.length,
        attendanceCount: state.student.asistencias,
        correctCount,
        attendanceCredits,
        credits,
        grade,
        code: (() => {
          const base = `${state.student.legajo}.${encodedAttemptAndGrade}.${encodedAnswers}`;
          return `${base}.${calcularSumaDeControl(base)}`;
        })(),
      };

      saveResultSnapshot(state.result);
      persistSession();
      renderResultScreen();
    }

    function saveResultSnapshot(result) {
      const snapshot = normalizeResultSnapshot(result);
      const existingIndex = state.resultHistory.findIndex((item) => item.attempt === snapshot.attempt);

      if (existingIndex >= 0) {
        state.resultHistory[existingIndex] = snapshot;
      } else {
        state.resultHistory.push(snapshot);
      }

      state.resultHistory.sort((a, b) => a.attempt - b.attempt);
      state.resultHistory = state.resultHistory.slice(-MAX_ATTEMPTS);
    }

    function renderResultScreen() {
      setScreen("result");
      clearIntegrityMessageTimer();
      const result = normalizeResultSnapshot(state.result || state.resultHistory[state.resultHistory.length - 1]);
      if (!result) {
        renderStartScreen();
        return;
      }

      state.result = result;
      saveResultSnapshot(result);
      persistSession();
      state.integrityMessage = "";
      state.exitWarnings = 0;
      state.lastExitAt = 0;
      const resultIndex = state.resultHistory.findIndex((item) => item.attempt === result.attempt);
      const hasPreviousResult = resultIndex > 0;
      const hasNextResult = resultIndex >= 0 && resultIndex < state.resultHistory.length - 1;
      examContainer.className = "result-screen";
      examContainer.innerHTML = `
        <section class="result-panel">
          <div class="result-nav" aria-label="Navegación de intentos">
            <button id="previousResultButton" class="result-nav-button previous" type="button" aria-label="Ver intento anterior" ${hasPreviousResult ? "" : "disabled"}>
              <img src="${CHEVRON_LEFT_ICON}" alt="" aria-hidden="true">
            </button>
            <h3>Intento ${result.attempt}/${MAX_ATTEMPTS}</h3>
            <button id="nextResultButton" class="result-nav-button next" type="button" aria-label="Ver intento siguiente" ${hasNextResult ? "" : "disabled"}>
              <img src="${CHEVRON_LEFT_ICON}" alt="" aria-hidden="true">
            </button>
          </div>
          <div class="result-grid">
            <div class="metric"><strong>${result.correctCount} / ${result.questionCount}</strong><span>Respuestas correctas</span></div>
            <div class="metric"><strong>${result.attendanceCount}</strong><span>Asistencias registradas</span></div>
            <div class="metric"><strong>${result.attendanceCredits}</strong><span>Créditos por asistencia</span></div>
            <div class="metric"><strong>${formatGrade(result.grade)}</strong><span>Nota</span></div>
          </div>
          <p class="paper-subtitle">Código para compartir por WhatsApp</p>
          <div id="resultCode" class="result-code">${escapeHtml(result.code)}</div>
          <div class="actions">
            <button id="copyCodeButton" class="primary-button" type="button">Copiar código</button>
            <button id="newExamButton" class="secondary-button" type="button" ${state.attempt >= MAX_ATTEMPTS || isTimeExpired() ? "disabled" : ""}>Nuevo intento</button>
          </div>
          <p id="copyMessage" class="form-message"></p>
        </section>
      `;

      ajustarFuenteCodigo();
      document.getElementById("previousResultButton").addEventListener("click", () => showResultByOffset(-1));
      document.getElementById("nextResultButton").addEventListener("click", () => showResultByOffset(1));
      document.getElementById("copyCodeButton").addEventListener("click", copyResultCode);
      document.getElementById("newExamButton").addEventListener("click", takeNewExam);
      updateMeta();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showResultByOffset(offset) {
      const currentIndex = state.resultHistory.findIndex((item) => item.attempt === state.result?.attempt);
      const nextResult = state.resultHistory[currentIndex + offset];
      if (!nextResult) {
        return;
      }

      state.result = nextResult;
      renderResultScreen();
    }

    async function copyResultCode() {
      const code = state.result?.code || "";
      const message = document.getElementById("copyMessage");
      const codeField = document.getElementById("resultCode");

      try {
        if (!navigator.clipboard?.writeText) {
          throw new Error("Clipboard API no disponible");
        }

        await navigator.clipboard.writeText(code);
        message.style.color = "var(--ok)";
        message.textContent = "Código copiado.";
      } catch {
        const temp = document.createElement("textarea");
        temp.value = code;
        temp.style.cssText = "position:fixed;opacity:0;pointer-events:none";
        document.body.appendChild(temp);
        temp.select();

        try {
          const copied = document.execCommand("copy");
          document.body.removeChild(temp);
          if (!copied) {
            throw new Error("execCommand no copió");
          }

          message.style.color = "var(--ok)";
          message.textContent = "Código copiado.";
        } catch {
          message.style.color = "var(--bad)";
          message.textContent = "El navegador bloqueó el copiado automático. El código quedó seleccionado para copiarlo manualmente.";
        }
      }
    }

    function takeNewExam() {
      const latestAttempt = Math.max(state.attempt, ...state.resultHistory.map((result) => result.attempt), 0);
      if (latestAttempt >= MAX_ATTEMPTS || isTimeExpired()) {
        return;
      }

      state.attempt = latestAttempt + 1;
      state.attemptBlocked = false;
      state.integrityMessage = "";
      state.exitWarnings = 0;
      state.lastExitAt = 0;
      persistSession();
      beginExam();
    }

    function isTimeExpired() {
      return Number.isFinite(state.deadlineAt) && Date.now() > state.deadlineAt;
    }

    function ajustarFuenteCodigo() {
      const el = document.getElementById("resultCode");
      if (!el) return;
      el.style.fontSize = "";
      const max = parseFloat(getComputedStyle(el).fontSize);
      const min = 9;
      let size = max;
      while (el.scrollWidth > el.clientWidth && size > min) {
        size -= 0.5;
        el.style.fontSize = size + "px";
      }
    }

    function clampNumber(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function formatGrade(value) {
      return Number.isInteger(value) ? String(value) : value.toFixed(2);
    }

    function getCodeGrade(value) {
      return clampNumber(Math.round(value), 1, 10);
    }

    function updateMeta() {
      const total = state.currentQuestions.length || 0;
      document.title = state.exam?.title || APP_NAME;
      progress.textContent = `${state.answers.size} / ${total}`;
      finishButton.disabled = state.screen !== "exam" || state.attemptBlocked || total === 0 || state.answers.size !== total || isTimeExpired();
      updateTimeStatus();
    }

    function setScreen(screen) {
      state.screen = screen;
      document.body.dataset.screen = screen;
    }

    function updateTimeStatus() {
      if (!state.deadlineAt) {
        heroTimer.textContent = "60:00";
        return;
      }

      const remaining = Math.max(0, state.deadlineAt - Date.now());
      const minutes = Math.floor(remaining / 60000);
      const seconds = Math.floor((remaining % 60000) / 1000);
      heroTimer.textContent = `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;

      if (remaining === 0 && state.screen === "exam") {
        finishButton.disabled = true;
      }
    }

    async function registerServiceWorker() {
      if (!("serviceWorker" in navigator) || window.location.protocol === "file:") {
        return;
      }

      try {
        await navigator.serviceWorker.register("./sw.js");
      } catch {
        // Si el registro falla, la app sigue funcionando como sitio estático.
      }
    }

    function renderMarkdown(markdown) {
      const lines = markdown.split("\n");
      const parts = [];
      let paragraph = [];
      let inCode = false;
      let codeLanguage = "";
      let codeLines = [];

      function flushParagraph() {
        if (paragraph.length === 0) return;
        const text = paragraph.join(" ").trim();
        if (text) {
          parts.push(`<p>${renderInlineMarkdown(text)}</p>`);
        }
        paragraph = [];
      }

      for (const line of lines) {
        const trimmed = line.trim();

        if (trimmed.startsWith("```")) {
          flushParagraph();
          if (inCode) {
            parts.push(renderCodeBlock(codeLines.join("\n"), codeLanguage));
            codeLines = [];
            codeLanguage = "";
            inCode = false;
          } else {
            inCode = true;
            codeLanguage = trimmed.slice(3).trim().toLowerCase();
          }
          continue;
        }

        if (inCode) {
          codeLines.push(line);
          continue;
        }

        if (!trimmed) {
          flushParagraph();
          continue;
        }

        paragraph.push(line);
      }

      flushParagraph();

      if (inCode) {
        parts.push(renderCodeBlock(codeLines.join("\n"), codeLanguage));
      }

      return parts.join("");
    }

    function renderCodeBlock(code, language) {
      return `<pre><code class="language-${escapeHtml(language || "plain")}">${highlightCode(code, language)}</code></pre>`;
    }

    function highlightCode(code, language) {
      const lang = (language || "").toLowerCase();

      if (lang === "cs" || lang === "csharp") {
        return highlightByPatterns(code, [
          ["comment", /\/\/[^\n]*/g],
          ["string",  /"(?:\\.|[^"\\])*"/g],
          ["char",    /'(?:\\.|[^'\\])+'/g],
          ["number",  /\b\d+(?:\.\d+)?\b/g],
          ["keyword", /\b(?:using|namespace|class|record|struct|interface|enum|public|private|protected|internal|static|void|int|string|bool|var|new|return|if|else|switch|case|default|break|continue|for|foreach|while|do|try|catch|finally|throw|null|true|false|this|base|out|ref|in|is|as|params)\b/g],
          ["type",    /\b(?:Console|List|File|Directory|Path|Environment|Exception|ConsoleKeyInfo|ConsoleKey)\b/g],
        ]);
      }

      if (lang === "bash" || lang === "sh" || lang === "zsh" || lang === "shell") {
        return highlightByPatterns(code, [
          ["comment", /#[^\n]*/g],
          ["string",  /"(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*'/g],
          ["var",     /\$[A-Za-z_][A-Za-z0-9_]*|\$\{[^}]+\}/g],
          ["number",  /\b\d+\b/g],
          ["keyword", /\b(?:if|then|else|fi|for|in|do|done|case|esac|while|function)\b/g],
          ["command", /^(?:\s*)(?:dotnet|git|cd|ls|cat|rg|sed|python3|bash|zsh|mkdir|cp|mv|rm)\b/gm],
        ]);
      }

      return escapeHtml(code);
    }

    function highlightByPatterns(code, patterns) {
      const tokens = [];

      for (const [type, regex] of patterns) {
        for (const match of code.matchAll(regex)) {
          if (match.index == null || match[0].length === 0) continue;
          tokens.push({
            start: match.index,
            end: match.index + match[0].length,
            type,
          });
        }
      }

      tokens.sort((a, b) => a.start - b.start || b.end - a.end);

      const filtered = [];
      let lastEnd = -1;
      for (const token of tokens) {
        if (token.start < lastEnd) continue;
        filtered.push(token);
        lastEnd = token.end;
      }

      let result = "";
      let cursor = 0;

      for (const token of filtered) {
        if (token.start > cursor) {
          result += escapeHtml(code.slice(cursor, token.start));
        }
        result += `<span class="tok-${token.type}">${escapeHtml(code.slice(token.start, token.end))}</span>`;
        cursor = token.end;
      }

      if (cursor < code.length) {
        result += escapeHtml(code.slice(cursor));
      }

      return result;
    }

    function renderInlineMarkdown(text) {
      let html = escapeHtml(text);
      html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
      html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      html = html.replace(/\*([^*]+)\*/g, "<em>$1</em>");
      return html;
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    boot();
    measureHeroHeights();
    syncHeroState();
    registerServiceWorker();
  </script>
</body>
</html>
